packages:
  - packages/*
  - benchmarks/news
  - benchmarks/news/*
  - benchmarks/js-framework
  - benchmarks/js-framework/*
  - benchmarks/recursive-context
  - benchmarks/recursive-context/*
  - benchmarks/signal-favoring
  - benchmarks/signal-favoring/*
  - playground/*

allowBuilds:
  esbuild: true
  playwright: true

# Variables
esrap_common: &esrap_common ^2.2.9
prettier_common: &prettier_common ^3.8.3
ts_common: &ts_common ^5.9.3

overrides:
  esrap: *esrap_common
  # Solid 2.0 SSR alignment: vite-plugin-solid@3.0.0-next.5 pulls
  # babel-preset-solid@2.0.0-beta.7 transitively (→ babel-plugin-jsx-dom-expressions
  # 0.41, which still EMITS the `ssrRunInScope` SSR helper), but @solidjs/web@2.0.0-beta.14
  # REMOVED that export (dom-expressions 0.50 stopped emitting it). Force the
  # transform to the 0.50-era preset the catalog already intends so SSR output
  # matches the installed runtime. Without this, SSR throws "does not provide an
  # export named 'ssrRunInScope'".
  babel-preset-solid: '2.0.0-beta.14'
  babel-plugin-jsx-dom-expressions: '0.50.0-next.13'

catalogs:
  default:
    '@changesets/changelog-github': ^0.7.0
    '@changesets/cli': ^2.31.0
    '@ripple-ts/adapter': ^0.3.85
    '@ripple-ts/vite-plugin':  ^0.3.85
    '@solidjs/web': '2.0.0-beta.14'
    '@tsrx/core': ^0.1.33
    '@tsrx/prettier-plugin': ^0.3.85
    '@tsrx/ripple': ^0.1.33
    '@tsrx/react': ^0.2.33
    '@tsrx/solid': ^ 0.1.33
    '@tsrx/vite-plugin-react': ^0.0.65
    '@tsrx/vite-plugin-solid': ^0.0.63
    '@types/node': ^24.3.0
    '@vitejs/plugin-react': ^6.0.3
    esbuild: ^0.28.1
    esrap: *esrap_common
    happy-dom: ^20.10.6
    jsdom: ^29.0.2
    playwright: ^1.61.0
    prettier: *prettier_common
    react: ^19.2.0
    react-dom: ^19.2.0
    ripple: ^0.3.85
    solid-js: '2.0.0-beta.14'
    terser: ^5.31.0
    type-fest: ^5.6.0
    typescript: *ts_common
    vite: ^8.0.16
    vite-plugin-solid: '3.0.0-next.5'
    vitest: ^4.1.9

