<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>@octanejs/tiptap browser harness</title>
		<style>
			:root {
				font-family: system-ui, sans-serif;
				color: #172033;
				background: #f5f7fb;
			}

			body {
				margin: 0;
				padding: 48px;
			}

			#root {
				width: 680px;
				margin: 0 auto;
			}

			.editor-shell {
				position: relative;
				padding: 24px;
				background: white;
				border-radius: 16px;
				box-shadow: 0 12px 32px rgb(23 32 51 / 12%);
			}

			.editor-host {
				position: relative;
			}

			.ProseMirror {
				min-height: 340px;
				padding: 24px;
				border: 2px solid #bcc6db;
				border-radius: 10px;
				background: white;
				outline: none;
			}

			.ProseMirror:focus {
				border-color: #526fd6;
			}

			.ProseMirror > p {
				min-height: 28px;
				margin: 8px 0 20px;
				line-height: 28px;
			}

			[data-browser-menu] {
				box-sizing: border-box;
				min-width: 132px;
				padding: 8px 12px;
				border: 1px solid #263357;
				border-radius: 7px;
				background: #263357;
				color: white;
				font-size: 14px;
				line-height: 20px;
				z-index: 10;
			}

			.draggable-card {
				display: grid;
				grid-template-columns: auto 1fr;
				gap: 12px;
				align-items: center;
				margin: 12px 0;
				padding: 12px;
				border: 1px solid #aebbd8;
				border-radius: 8px;
				background: #f7f9ff;
			}

			.drag-handle {
				padding: 6px 9px;
				border: 1px solid #526fd6;
				border-radius: 5px;
				background: white;
				color: #263357;
				cursor: grab;
				user-select: none;
			}

			.card-content {
				min-height: 24px;
				line-height: 24px;
			}

			#drop-target {
				margin-top: 24px;
				padding: 18px;
				border: 2px dashed #6b7ca7;
				border-radius: 8px;
				background: white;
			}

			#drop-result {
				display: block;
				min-height: 24px;
				margin-top: 6px;
				font-family: ui-monospace, monospace;
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/main.tsrx"></script>
	</body>
</html>
