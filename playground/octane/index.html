<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>octane playground</title>
		<style>
			:root {
				color-scheme: light dark;
				--fg: #1a1a1a;
				--muted: #6b6b6b;
				--border: #d8d8d8;
				--accent: #2563eb;
				--bg: #ffffff;
				--panel: #fafafa;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--fg: #f0f0f0;
					--muted: #9a9a9a;
					--border: #2a2a2a;
					--accent: #60a5fa;
					--bg: #0e0e0e;
					--panel: #161616;
				}
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				padding: 0;
			}
			body {
				font:
					14px/1.5 -apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					system-ui,
					sans-serif;
				color: var(--fg);
				background: var(--bg);
				min-height: 100vh;
			}
			header.demo-header {
				padding: 20px 24px 12px;
				border-bottom: 1px solid var(--border);
			}
			header.demo-header h1 {
				margin: 0;
				font-size: 18px;
				font-weight: 600;
			}
			header.demo-header p {
				margin: 4px 0 0;
				color: var(--muted);
				font-size: 13px;
			}
			nav.demo-nav {
				display: flex;
				gap: 4px;
				flex-wrap: wrap;
				padding: 12px 24px;
				border-bottom: 1px solid var(--border);
				background: var(--panel);
			}
			nav.demo-nav button {
				padding: 6px 12px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--fg);
				cursor: pointer;
				font: inherit;
				border-radius: 4px;
			}
			nav.demo-nav button.active {
				background: var(--accent);
				color: white;
				border-color: var(--accent);
			}
			main.demo-stage {
				padding: 24px;
				max-width: 720px;
			}
			h2.demo-title {
				margin: 0 0 4px;
				font-size: 16px;
				font-weight: 600;
			}
			p.demo-blurb {
				margin: 0 0 16px;
				color: var(--muted);
				font-size: 13px;
			}
			.panel {
				padding: 16px;
				border: 1px solid var(--border);
				border-radius: 6px;
				background: var(--panel);
			}
			.row {
				display: flex;
				gap: 8px;
				align-items: center;
			}
			.row > * {
				font: inherit;
			}
			button.btn {
				padding: 6px 12px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--fg);
				cursor: pointer;
				border-radius: 4px;
			}
			button.btn:hover {
				border-color: var(--accent);
			}
			input.txt {
				padding: 6px 10px;
				border: 1px solid var(--border);
				background: var(--bg);
				color: var(--fg);
				border-radius: 4px;
			}
			ul.list {
				list-style: none;
				padding: 0;
				margin: 12px 0;
			}
			ul.list li {
				padding: 6px 10px;
				border: 1px solid var(--border);
				border-radius: 4px;
				margin-bottom: 4px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			code.kbd {
				font-family: ui-monospace, Menlo, monospace;
				background: var(--panel);
				padding: 2px 6px;
				border-radius: 3px;
				font-size: 12px;
				color: var(--accent);
			}
			pre.boom {
				background: #fef2f2;
				color: #991b1b;
				padding: 12px;
				border-radius: 4px;
				font-family: ui-monospace, Menlo, monospace;
				font-size: 12px;
			}

			/* @octanejs/cmdk ships unstyled — it exposes a DOM contract of
				 `cmdk-*` attributes to style against. */
			.cmdk-shell [cmdk-root] {
				border: 1px solid var(--border);
				border-radius: 8px;
				background: var(--panel);
				overflow: hidden;
			}
			[cmdk-input] {
				width: 100%;
				padding: 12px 14px;
				border: 0;
				border-bottom: 1px solid var(--border);
				background: transparent;
				color: var(--fg);
				font: inherit;
				outline: none;
			}
			[cmdk-list] {
				max-height: 320px;
				overflow: auto;
				padding: 6px;
				/* The port keeps this in sync with the results' height. */
				transition: height 120ms ease;
			}
			[cmdk-item] {
				display: flex;
				align-items: center;
				padding: 8px 10px;
				border-radius: 5px;
				cursor: pointer;
				-webkit-user-select: none;
				user-select: none;
				font-size: 13px;
			}
			[cmdk-item][data-selected='true'] {
				background: var(--accent);
				color: #fff;
			}
			[cmdk-item][data-disabled='true'] {
				color: var(--muted);
				cursor: not-allowed;
			}
			[cmdk-group-heading] {
				padding: 10px 10px 4px;
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.04em;
				color: var(--muted);
			}
			[cmdk-separator] {
				height: 1px;
				margin: 6px 4px;
				background: var(--border);
			}
			[cmdk-empty] {
				padding: 18px 10px;
				text-align: center;
				font-size: 13px;
				color: var(--muted);
			}
			.cmdk-dialog-overlay {
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.45);
			}
			.cmdk-dialog-content {
				position: fixed;
				top: 20%;
				left: 50%;
				transform: translateX(-50%);
				width: min(560px, calc(100vw - 32px));
				border: 1px solid var(--border);
				border-radius: 10px;
				background: var(--bg);
				box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
				overflow: hidden;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
