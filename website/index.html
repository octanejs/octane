<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Octane — React's programming model, compiled ahead of time. No VDOM, no rules of hooks."
		/>
		<title>Octane — React's programming model, compiled</title>
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<style>
			/* Global base — everything component-scoped lives in scoped <style> blocks;
			   only the document-level reset/palette belongs here (inline so the SSR
			   first paint is styled with no external request). react.dev-inspired,
			   dark-first. */
			:root {
				--bg: #23272f;
				--panel: #2b3138;
				--code-bg: #16181d;
				--text: #f4eee8;
				--text-secondary: #99a1b3;
				--accent: #ff415a;
				--accent-hover: #ff5d72;
				--accent-text: #ff5d72;
				--border: rgba(255, 255, 255, 0.1);
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			html {
				-webkit-text-size-adjust: 100%;
			}
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family:
					Inter,
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				line-height: 1.6;
				font-size: 16px;
			}
			code,
			pre,
			kbd,
			samp {
				font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
			}
			a {
				color: var(--accent-text);
				text-decoration: none;
			}
			a:hover {
				color: var(--accent-hover);
			}
			::selection {
				background: rgba(255, 65, 90, 0.45);
			}
			/* Shiki emits `<pre class="shiki github-dark">` with inline token colors;
			   normalize its frame to the site's code panel. */
			pre.shiki {
				background: var(--code-bg) !important;
				border: 1px solid var(--border);
				border-radius: 1rem;
				padding: 1rem 1.25rem;
				overflow-x: auto;
				font-size: 0.875rem;
				line-height: 1.7;
				tab-size: 2;
			}
		</style>
		<!--ssr-head-->
	</head>
	<body>
		<div id="root"><!--ssr-body--></div>
	</body>
</html>
