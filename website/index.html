<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Octane — React's programming model, compiled ahead of time. No VDOM, no rules of hooks."
		/>
		<title>Octane — React's programming model, compiled</title>
		<!-- The .ico carries 16/32/48 frames (48 is the multiple-of-48 square Google
		     Search wants); SVG is listed after it so browsers that support SVG
		     favicons pick it, while legacy UAs and crawlers keep the .ico. -->
		<link rel="icon" href="/favicon.ico" sizes="48x48 32x32 16x16" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#23272f" />
		<!-- Social link previews. Scrapers don't run JS and every route serves this
		     template, so these are site-wide; per-route cards would need injection
		     through the ssr-head slot. No rel=canonical / og:url for the same
		     reason: a homepage URL baked into every route would tell crawlers and
		     share-aggregators that subpages are duplicates of the homepage.
		     X/Twitter falls back to og:* for title/description/image, so only
		     twitter:card is declared explicitly. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Octane" />
		<meta property="og:title" content="Octane — React's programming model, compiled" />
		<meta
			property="og:description"
			content="React's programming model, compiled ahead of time. No VDOM, no rules of hooks."
		/>
		<meta property="og:image" content="https://octanejs.dev/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta
			property="og:image:alt"
			content="Octane — React's programming model, compiled ahead of time"
		/>
		<meta name="twitter:card" content="summary_large_image" />
		<style>
			/* Global base — everything component-scoped lives in scoped <style> blocks;
			   only the document-level reset/palette belongs here (inline so the SSR
			   first paint is styled with no external request). react.dev-inspired,
			   dark-first. */
			:root {
				--bg: #23272f;
				--panel: #2b3138;
				--code-bg: #16181d;
				--text: #f4eee8;
				--text-secondary: #99a1b3;
				--accent: #ff415a;
				--accent-hover: #ff5d72;
				--accent-text: #ff5d72;
				--on-accent: #16181d;
				--border: rgba(255, 255, 255, 0.1);
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			html {
				-webkit-text-size-adjust: 100%;
			}
			body {
				margin: 0;
				background: var(--bg);
				color: var(--text);
				font-family:
					Inter,
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					Helvetica,
					Arial,
					sans-serif;
				line-height: 1.6;
				font-size: 16px;
			}
			code,
			pre,
			kbd,
			samp {
				font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
			}
			a {
				color: var(--accent-text);
				text-decoration: none;
			}
			a:hover {
				color: var(--accent-hover);
			}
			::selection {
				background: rgba(255, 65, 90, 0.45);
			}
			/* Shiki emits a themed `<pre class="shiki …">` with inline token colors;
			   normalize its frame to the site's code panel. */
			pre.shiki {
				background: var(--code-bg) !important;
				border: 1px solid var(--border);
				border-radius: 1rem;
				padding: 1rem 1.25rem;
				overflow-x: auto;
				font-size: 0.875rem;
				line-height: 1.7;
				tab-size: 2;
			}
		</style>
		<!--ssr-head-->
	</head>
	<body>
		<div id="root"><!--ssr-body--></div>
	</body>
</html>
