name: Publish

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}

permissions: {}

jobs:
  publish:
    if: github.repository == 'octanejs/octane' && contains(github.event.head_commit.message, 'Version Packages')
    permissions:
      contents: write
      id-token: write
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          # Do not enable dependency caching in this workflow. This job has
          # id-token: write and publishes to npm, so restoring a shared Actions
          # cache here can turn cache poisoning into a trusted-publish compromise.

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Disallow major and minor bumps in changesets
        run: pnpm changeset:check

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # npm trusted publishing via OIDC (id-token: write) — no NPM_TOKEN.
          PNPM_CONFIG_PROVENANCE: true
          NPM_CONFIG_PROVENANCE: true
