name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release_merge:
    name: classify changeset release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    outputs:
      is_release: ${{ steps.classify.outputs.is_release }}

    steps:
      # Changesets release PRs are created with GITHUB_TOKEN, so GitHub does not
      # run pull_request workflows for them. Authenticate the merge from the PR
      # metadata and git trees, then prove its parent passed the full test suite.
      # Any missing or unexpected data falls back to the full test matrix.
      - name: Identify a generated Changesets release merge
        id: classify
        uses: actions/github-script@v8
        with:
          script: |
            core.setOutput("is_release", "false");

            const message = context.payload.head_commit?.message ?? "";
            const commits = context.payload.commits ?? [];
            if (
              context.eventName !== "push" ||
              context.ref !== "refs/heads/main" ||
              !message.startsWith("Version Packages") ||
              commits.length !== 1
            ) {
              return;
            }

            try {
              const { owner, repo } = context.repo;
              const { data: pulls } =
                await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: context.sha,
                });
              const matches = pulls.filter(
                (pull) =>
                  pull.merged_at !== null &&
                  pull.merge_commit_sha === context.sha &&
                  pull.title === "Version Packages" &&
                  pull.user?.login === "github-actions[bot]" &&
                  pull.base.ref === "main" &&
                  pull.base.repo?.full_name === `${owner}/${repo}` &&
                  pull.head.ref === "changeset-release/main" &&
                  pull.head.repo?.full_name === `${owner}/${repo}`,
              );

              if (matches.length !== 1) {
                core.warning(
                  `Expected one generated Changesets PR for ${context.sha}; found ${matches.length}. Running the full tests.`,
                );
                return;
              }

              const releaseFiles = await github.paginate(
                github.rest.pulls.listFiles,
                {
                  owner,
                  repo,
                  pull_number: matches[0].number,
                  per_page: 100,
                },
              );
              const unexpectedFiles = releaseFiles.filter((file) => {
                if (
                  file.status === "removed" &&
                  /^\.changeset\/[^/]+\.md$/.test(file.filename)
                ) {
                  return false;
                }
                if (file.status !== "added" && file.status !== "modified") {
                  return true;
                }
                return !(
                  file.filename.endsWith("/CHANGELOG.md") ||
                  file.filename.endsWith("/package.json") ||
                  file.filename === "docs/bindings-status.md" ||
                  file.filename === "docs/packages.md" ||
                  file.filename ===
                    "packages/octane-evals/datasets/train/user-apps-v1/manifest.jsonl"
                );
              });

              if (releaseFiles.length === 0 || unexpectedFiles.length > 0) {
                const sample = unexpectedFiles
                  .slice(0, 5)
                  .map((file) => file.filename)
                  .join(", ");
                core.warning(
                  `Changesets PR #${matches[0].number} contains unexpected files${sample ? `: ${sample}` : ""}. Running the full tests.`,
                );
                return;
              }

              const [{ data: merged }, { data: generated }] = await Promise.all([
                github.rest.repos.getCommit({ owner, repo, ref: context.sha }),
                github.rest.repos.getCommit({
                  owner,
                  repo,
                  ref: matches[0].head.sha,
                }),
              ]);
              const sameTree = merged.commit.tree.sha === generated.commit.tree.sha;
              const sameParent =
                merged.parents.length === 1 &&
                generated.parents.length === 1 &&
                merged.parents[0].sha === generated.parents[0].sha;
              const expectedReleaseCommit =
                generated.commit.message === "Version Packages" &&
                generated.commit.author?.email ===
                  "41898282+github-actions[bot]@users.noreply.github.com" &&
                generated.commit.committer?.email ===
                  "41898282+github-actions[bot]@users.noreply.github.com";

              if (!sameTree || !sameParent || !expectedReleaseCommit) {
                core.warning(
                  `Changesets merge ${context.sha} does not match its generated PR commit. Running the full tests.`,
                );
                return;
              }

              const parentSha = merged.parents[0].sha;
              const { data: parentRuns } =
                await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: "ci.yml",
                  branch: "main",
                  event: "push",
                  status: "completed",
                  head_sha: parentSha,
                  per_page: 10,
                });
              const requiredTestJobs = ["test (22)", "test (24)"];
              let parentPassedTests = false;

              for (const run of parentRuns.workflow_runs) {
                if (
                  run.head_sha !== parentSha ||
                  run.head_branch !== "main" ||
                  run.head_repository?.full_name !== `${owner}/${repo}` ||
                  run.event !== "push" ||
                  typeof run.head_commit?.message !== "string" ||
                  run.head_commit.message.startsWith("Version Packages")
                ) {
                  continue;
                }

                const jobs = await github.paginate(
                  github.rest.actions.listJobsForWorkflowRun,
                  { owner, repo, run_id: run.id, per_page: 100 },
                );
                const successfulJobs = new Set(
                  jobs
                    .filter((job) => job.conclusion === "success")
                    .map((job) => job.name),
                );
                if (requiredTestJobs.every((name) => successfulJobs.has(name))) {
                  parentPassedTests = true;
                  break;
                }
              }

              if (!parentPassedTests) {
                core.warning(
                  `The parent of Changesets merge ${context.sha} has no completed CI run with the full test suite passing. Running the full tests.`,
                );
                return;
              }

              core.setOutput("is_release", "true");
            } catch (error) {
              core.warning(
                `Could not authenticate Changesets merge ${context.sha}: ${error.message}. Running the full tests.`,
              );
            }

  test_shard:
    name: test shard (Node ${{ matrix.node-version }}, ${{ matrix.shard }})
    needs: release_merge
    # Each source change has already passed this matrix before Changesets
    # generates its metadata-only release commit. Keep the post-merge CI run
    # (publishing waits for it), but do not repeat the full suite once the merge
    # has been authenticated above.
    if: ${{ always() && !cancelled() && needs.release_merge.outputs.is_release != 'true' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22, 24]
        # Keep the full supported-Node coverage while splitting the large
        # Vitest suite across runners. Four shards cuts the CI critical path
        # substantially without letting repeated global setup dominate.
        shard: ["1/4", "2/4", "3/4", "4/4"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --prod false --frozen-lockfile

      # Website ssr-hydration e2e and Dexie upstream browser scenarios both drive
      # real Chromium. Without a browser those specs fail; installing here makes
      # CI actually enforce them.
      - name: Install Playwright Chromium
        run: pnpm --filter website exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test --shard=${{ matrix.shard }}

  # Keep the existing required check names while the work happens in parallel
  # above. `always()` makes a failed shard produce a failed required check and
  # lets an authenticated release skip satisfy the contexts publishing expects.
  test:
    name: test (${{ matrix.required-context }})
    needs: [release_merge, test_shard]
    if: ${{ always() }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Keep one stable aggregate context for each supported Node release.
        required-context: [22, 24]

    steps:
      - name: Verify all test shards passed
        env:
          IS_CHANGESET_RELEASE_MERGE: ${{ needs.release_merge.outputs.is_release }}
          SHARD_RESULT: ${{ needs.test_shard.result }}
        run: |
          if [ "$IS_CHANGESET_RELEASE_MERGE" = true ]; then
            test "$SHARD_RESULT" = skipped
          else
            test "$SHARD_RESULT" = success
          fi

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # The production-error catalog is append-only. Its check compares the
          # current tree with the PR base or previous main commit.
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      # Two-layer sync check for the RuleSync-generated agent files. The root
      # `prepare` script already re-ran `rulesync generate || true` during
      # install, so if the committed files were stale they are now MODIFIED in
      # the working tree — `git diff` is what actually catches that. The
      # explicit `rules:check` still matters for the case where prepare's
      # rulesync invocation failed silently (it is `|| true` by design).
      - name: Check AI rule files are in sync
        run: |
          pnpm rules:check
          git diff --exit-code -- AGENTS.md CLAUDE.md GEMINI.md .github/copilot-instructions.md .cursor/rules/

      # 0.x alpha: changesets must stay on the patch track. release/publish
      # already enforce this, but checking on PRs surfaces a stray major/minor
      # bump at review time instead of at release time.
      - name: Disallow major and minor bumps in changesets
        run: pnpm changeset:check

      # A committed test must execute and pass. Intentional framework
      # divergences are ordinary assertions; missing environment prerequisites
      # fail with setup instructions instead of silently turning CI green.
      - name: Disallow skipped and expected-failure tests
        run: pnpm test:markers:check

      # docs/parity-gaps.md audits executable expected-failure pins and should
      # remain at zero under the committed-test policy above.
      - name: Check parity-gap index is current
        run: pnpm parity:gaps:check

      # React's stable release and current main are inventoried separately at
      # pinned commits. This network-free gate checks the extracted case IDs,
      # ledger dispositions/evidence, and generated coverage report so public
      # parity claims cannot drift away from their source data.
      - name: Check React parity inventory and ledger
        run: |
          pnpm react-parity:test
          pnpm react-parity:check

      # Redact's issues, pull requests, and tests are mined at a pinned commit
      # into an authored contract ledger. This network-free gate validates its
      # dispositions/local evidence and keeps the generated report current.
      - name: Check Redact-derived adversarial contract ledger
        env:
          OCTANE_REDACT_AUDIT_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm redact-audit:check

      # Production error URLs are a public compatibility surface. Keep the
      # append-only catalog, generated client/server formatters, and literal
      # runtime call sites synchronized before a package can be built.
      - name: Check Octane production error catalog
        env:
          OCTANE_ERROR_CODES_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm error-codes:check

      # Package discovery is shared by every package-wide repository check.
      # This generated inventory catches unreviewed package additions and stale
      # hard-coded package counts before they spread to docs and tooling.
      - name: Check package inventory is current
        run: pnpm packages:inventory:check

      - name: Check binding parity-gap index is current
        run: pnpm binding-parity:gaps:check

      # docs/bindings-status.md is generated from the per-package status.json
      # blocks in the @octanejs/* binding packages. Changing a binding's scope
      # means updating its status.json and regenerating in the same change.
      - name: Check bindings-status table is current
        run: pnpm bindings:status:check

      - name: Check Lucide generated sources are current
        run: pnpm lucide:generate:check

      # The publish build otherwise only runs at prepack, so a broken dist
      # (an entry point missing from the build, an unresolvable relative
      # import in dist/ or the verbatim-copied compiler/) would ship silently.
      # build.mjs ends with verify-dist.mjs: every emitted module's imports
      # must resolve and every publishConfig export must import in plain Node.
      - name: Build octane package and verify dist
        run: pnpm build

  typecheck_run:
    name: typecheck packages, website, and examples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Validate example catalog and orchestration
        run: pnpm examples:static:check

  examples:
    name: example apps (${{ matrix.shard }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Keep every app internally serial while spreading complete app
        # lifecycles across runners. The planner weights declared journeys and
        # repeated execution modes, then assigns each app to exactly one shard.
        shard: ["1/3", "2/3", "3/3"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --prod false --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter hacker-news-example exec playwright install --with-deps chromium

      - name: Run example browser journeys
        run: pnpm examples:e2e -- --shard=${{ matrix.shard }}

  # Keep the existing protected `typecheck` context stable while the actual
  # typecheck and browser-heavy example gate run in parallel. `always()` turns
  # either failed dependency into a failed required check instead of a skip.
  typecheck:
    needs: [typecheck_run, examples]
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      - name: Verify typecheck and example apps passed
        env:
          TYPECHECK_RESULT: ${{ needs.typecheck_run.result }}
          EXAMPLES_RESULT: ${{ needs.examples.result }}
        run: |
          test "$TYPECHECK_RESULT" = success
          test "$EXAMPLES_RESULT" = success

  three_compat:
    name: Three compatibility (${{ matrix.lane }})
    runs-on: ubuntu-latest
    # This matrix intentionally rewrites one importer without changing the
    # repository lockfile after the frozen base install.
    env:
      PNPM_CONFIG_VERIFY_DEPS_BEFORE_RUN: "false"

    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum r156
            version: 0.156.0
          - lane: current
            version: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install pinned repository dependencies
        run: pnpm install --frozen-lockfile

      # Keep the r172 differential oracle immutable. These lanes replace only
      # the Three runtime/type pair, then select the Octane-owned compatibility
      # suite so current/minimum support cannot be faked by the pinned oracle.
      - name: Install Three ${{ matrix.version }} compatibility pair
        run: |
          THREE_VERSION="$(pnpm view three@${{ matrix.version }} version)"
          THREE_RELEASE_LINE="${THREE_VERSION%.*}"
          pnpm --filter @octanejs/three add --save-dev --lockfile=false "three@$THREE_VERSION" "@types/three@${THREE_RELEASE_LINE}.x"
          echo "OCTANE_THREE_COMPAT_VERSION=$THREE_VERSION" >> "$GITHUB_ENV"

      - name: Verify resolved Three compatibility pair
        run: |
          THREE_VERSION="$(node -e "process.stdout.write(require('./packages/three/node_modules/three/package.json').version)")"
          TYPES_VERSION="$(node -e "process.stdout.write(require('./packages/three/node_modules/@types/three/package.json').version)")"
          THREE_RELEASE_LINE="${THREE_VERSION%.*}"
          TYPES_RELEASE_LINE="${TYPES_VERSION%.*}"
          echo "three=$THREE_VERSION @types/three=$TYPES_VERSION"
          test "$THREE_RELEASE_LINE" = "$TYPES_RELEASE_LINE"

      - name: Typecheck Three source and public API
        run: |
          pnpm exec tsgo --noEmit -p packages/three/tsconfig.json
          pnpm exec tsc --noEmit -p packages/three/typetests/tsconfig.json

      - name: Run Three compatibility behavior tests
        run: pnpm --dir packages/three test:compat

  lynx_compat:
    name: Lynx compatibility (${{ matrix.lane }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum
            registry_check: ""
          - lane: current
            registry_check: --check-registry

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install pinned repository dependencies
        run: pnpm install --frozen-lockfile

      # The script packs the four Octane packages, installs one exact Lynx
      # graph into a temporary external consumer without a lockfile, verifies
      # physical dependency identity, and performs two clean native builds.
      # The current lane additionally proves its exact versions still follow
      # the registry graph exposed by Rspeedy/Rsbuild dependency constraints.
      - name: Pack and build Lynx ${{ matrix.lane }} compatibility graph
        run: >-
          node packages/rspeedy-plugin-octane/scripts/compatibility-smoke.mjs
          --lane "${{ matrix.lane }}"
          ${{ matrix.registry_check }}

      - name: Verify the repository lockfile stayed immutable
        run: git diff --exit-code -- pnpm-lock.yaml

  package:
    name: validate publishable packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pack the live, discovered package set instead of a hand-maintained
      # allowlist. The validator checks the post-pnpm manifest and tar contents,
      # including exports/bin/types and workspace/catalog protocol replacement,
      # then installs packed core + binding tarballs into an isolated consumer
      # to prove singleton resolution and client/server raw-source compilation.
      - name: Pack and validate every publishable package
        run: pnpm packages:pack:check
